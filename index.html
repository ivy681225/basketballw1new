<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>球隊每週球聚登記系統 (週一版)</title>
  
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --primary: #f97316; 
      --primary-hover: #ea580c;
      --bg: #f8fafc;
      --card-bg: #ffffff;
      --text: #0f172a;
      --text-light: #64748b;
      --border: #e2e8f0;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans TC', sans-serif;
      background-color: var(--bg);
      color: var(--text);
      line-height: 1.6;
      padding: 20px 10px;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
    }
    .card {
      background: var(--card-bg);
      border-radius: 16px;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -1px rgba(0,0,0,0.03);
      padding: 24px;
      margin-bottom: 20px;
      border: 1px solid var(--border);
    }
    
    @media (max-width: 600px) {
      body { padding: 10px 5px; }
      .card { padding: 16px; border-radius: 12px; margin-bottom: 12px; }
    }
    
    .form-card {
      max-width: 600px;
      margin: 0 auto 20px;
    }
    h2 { font-size: 24px; margin-bottom: 16px; text-align: center; color: var(--primary); font-weight: 700; }
    .status-msg {
      background: #f1f5f9;
      padding: 12px;
      border-radius: 8px;
      font-size: 14px;
      margin-bottom: 20px;
      border-left: 4px solid var(--primary);
    }
    .form-group { margin-bottom: 16px; }
    label { display: block; font-weight: 700; font-size: 16px; margin-bottom: 8px; }
    input[type="text"], select {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 15px;
      font-family: inherit;
    }
    
    .selector-flex {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .selector-flex .form-group {
      margin-bottom: 0;
      width: 100%;
    }
    
    .radio-group {
      display: flex;
      gap: 20px;
      margin-top: 6px;
    }
    .radio-label {
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      font-size: 15px;
      font-weight: 500;
    }
    button {
      width: 100%;
      background: var(--primary);
      color: white;
      border: none;
      padding: 12px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: var(--primary-hover); }
    button:disabled { background: #cbd5e1; cursor: not-allowed; }
    
    .columns-container {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }
    
    @media (max-width: 768px) {
      .columns-container {
        grid-template-columns: 1fr;
        gap: 0px;
      }
    }
    
    .list-title {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 12px;
      display: flex;
      justify-content: flex-start;
      align-items: center;
      gap: 4px;
    }
    
    @media (max-width: 600px) {
      .list-title { font-size: 14px; }
    }

    ul { list-style: none; }
    li {
      background: #f8fafc;
      padding: 10px 12px;
      border-radius: 8px;
      margin-bottom: 8px;
      border: 1px solid var(--border);
      display: flex;
      flex-direction: column;
    }
    .player-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .identity-tag {
      font-size: 11px;
      padding: 2px 6px;
      border-radius: 4px;
      color: white;
      font-weight: 500;
      white-space: nowrap;
    }
    .bg-blue { background-color: #3b82f6; }
    .bg-green { background-color: #10b981; }
    .bg-orange { background-color: #f97316; }
    .time-tag {
      font-size: 11px;
      color: var(--text-light);
      margin-top: 4px;
    }
    
    .admin-area {
      display: flex;
      justify-content: center;
      margin-top: 30px;
    }
    .admin-btn {
      background: none;
      color: var(--text-light);
      border: 1px dashed var(--border);
      padding: 6px 16px;
      font-size: 12px;
      width: auto;
    }
    .admin-btn:hover { background: #f1f5f9; }
    
    .session-selector-zone {
      background: #ffedd5;
      border: 2px solid #fed7aa;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="card form-card session-selector-zone">
    <div class="selector-flex">
      <div class="form-group">
        <label for="quarterSelect" style="color: #ea580c; font-size: 15px;">🔍 1. 先選擇球聚季度：</label>
        <select id="quarterSelect" style="border-color: #ea580c; font-weight: bold; color: #ea580c;">
          <option value="current">⭐ 當期熱門球聚登記</option>
          <option value="y2026q3">📅 2026 第三季 (7-9月)</option>
          <option value="y2026q4">📅 2026 第四季 (10-12月)</option>
          <option value="y2027q1">📅 2027 第一季 (1-3月)</option>
          <option value="y2027q2">📅 2027 第二季 (4-6月)</option>
          <option value="y2027q3">📅 2027 第三季 (7-9月)</option>
          <option value="y2027q4">📅 2027 第四季 (10-12月)</option>
          <option value="history">📜 歷史球聚紀錄查詢</option>
        </select>
      </div>
      <div class="form-group">
        <label for="sessionSelect" style="color: #ea580c; font-size: 15px;">📅 2. 再選擇球聚日期：</label>
        <select id="sessionSelect" style="border-color: #ea580c; font-weight: bold; color: #0f172a;"></select>
      </div>
    </div>
  </div>

  <div class="card form-card">
    <h2>🏀 週一球聚登記系統</h2>
    <div class="status-msg" id="deadlineMessage">載入系統狀態中...</div>
  </div>

  <div class="card form-card">
    <div class="form-group">
      <label for="name">您的姓名：</label>
      <input type="text" id="name" placeholder="請輸入您在 LINE 群組裡的名字 (範例:王大明)" autocomplete="off">
    </div>
    <div class="form-group">
      <label for="identity">身分類別：</label>
      <select id="identity">
        <option value="季租">季租</option>
        <option value="散打">散打</option>
      </select>
    </div>
    <div class="form-group">
      <label>本次意願</label>
      <div class="radio-group">
        <label class="radio-label"><input type="radio" name="status" value="出賽" checked> 🔥 出賽</label>
        <label class="radio-label"><input type="radio" name="status" value="請假"> 💤 請假</label>
      </div>
    </div>
    <button id="submitBtn">確認送出報名</button>
  </div>

  <div class="columns-container">
    <div class="card">
      <div class="list-title">🟢 正取 (<span id="attendCount">0</span>/20)</div>
      <ul id="attendList"></ul>
    </div>

    <div class="card">
      <div class="list-title">🟠 候補 (<span id="waitCount">0</span>)</div>
      <ul id="waitList"></ul>
    </div>

    <div class="card">
      <div class="list-title">⚪ 請假 (<span id="leaveCount">0</span>)</div>
      <ul id="leaveList"></ul>
    </div>
  </div>

  <div class="admin-area">
    <button class="admin-btn" id="adminBtn">🔑 管理員登入</button>
    <span id="adminStatus" style="display:none; font-size:12px; color:#ef4444; font-weight:700;">🔓 管理員模式運作中 (刪除鈕已解鎖)</span>
  </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBs3GvdIOS3PDAadKjdFlPjnPdRS3quK3Y",
  authDomain: "basketballw1new.firebaseapp.com",
  databaseURL: "https://basketballw1new-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "basketballw1new",
  storageBucket: "basketballw1new.firebasestorage.app",
  messagingSenderId: "526216233626",
  appId: "1:526216233626:web:705118bb7c9ba9dcd59523",
  measurementId: "G-B75FWEJEK"
};

if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
const database = firebase.database();
const ADMIN_PASSWORD = "dan1225"; 
let isAdminMode = false;

const HOLIDAYS = [
  "2026-09-28", "2026-10-26",
  "2027-02-08", "2027-03-01", "2027-04-05", "2027-10-11", "2027-10-25"
];

let currentSelectedDateStr = "";
let sessionOptionsData = {};
let dbRef = null;
let rawCachedData = {};

let structuredQuarterData = {
  current: [], history: [],
  y2026q3: [], y2026q4: [],
  y2027q1: [], y2027q2: [], y2027q3: [], y2027q4: []
};

const quarterSelect = document.getElementById("quarterSelect");
const sessionSelect = document.getElementById("sessionSelect");
const deadlineMessage = document.getElementById("deadlineMessage");
const submitBtn = document.getElementById("submitBtn");
const nameInput = document.getElementById("name");
const identitySelect = document.getElementById("identity");
const adminBtn = document.getElementById("adminBtn");
const adminStatus = document.getElementById("adminStatus");

function formatDateToYYYYMMDD(date) { const y = date.getFullYear(); const m = String(date.getMonth() + 1).padStart(2, '0'); const d = String(date.getDate()).padStart(2, '0'); return `${y}-${m}-${d}`; }
function formatFullTimestamp(ts) { const d = new Date(ts); const year = d.getFullYear(); const month = String(d.getMonth() + 1).padStart(2, '0'); const date = String(d.getDate()).padStart(2, '0'); const hh = String(d.getHours()).padStart(2, '0'); const mm = String(d.getMinutes()).padStart(2, '0'); const ss = String(d.getSeconds()).padStart(2, '0'); return `${year}/${month}/${date} ${hh}:${mm}:${ss}`; }

function calculateSessionDetailsForDate(targetMonday) {
  let dateStr = formatDateToYYYYMMDD(targetMonday);
  const openTime = new Date(targetMonday); 
  openTime.setDate(targetMonday.getDate() - 6); 
  openTime.setHours(18, 0, 0, 0); 
  
  const finalDeadline = new Date(targetMonday); 
  finalDeadline.setDate(targetMonday.getDate() - 1); 
  finalDeadline.setHours(18, 0, 0, 0);
  
  return { 
    gameDateStr: dateStr, 
    openDateStr: formatDateToYYYYMMDD(openTime), 
    deadlineDateStr: formatDateToYYYYMMDD(finalDeadline), 
    openTime, 
    deadline: finalDeadline 
  };
}

function findDefaultMondayStr(now, availableDates) {
  let currentMonday = new Date(now);
  const currentDay = currentMonday.getDay();
  const daysUntilMonday = (1 - currentDay + 7) % 7;
  currentMonday.setDate(currentMonday.getDate() + daysUntilMonday);
  if (currentDay === 1 && now.getHours() >= 20) { currentMonday.setDate(currentMonday.getDate() + 7); }
  let targetStr = formatDateToYYYYMMDD(currentMonday);
  if (availableDates.includes(targetStr)) return targetStr;
  if (targetStr < availableDates[0]) return availableDates[0];
  if (targetStr > availableDates[availableDates.length - 1]) return availableDates[availableDates.length - 1];
  return availableDates[0];
}

function initSelectorOptions() {
  const now = new Date();
  let availableDates = [];

  let loop2026 = new Date("2026-07-06");
  const end2026 = new Date("2026-12-31");
  while (loop2026 <= end2026) {
    let dateStr = formatDateToYYYYMMDD(loop2026);
    if (!HOLIDAYS.includes(dateStr)) { availableDates.push(dateStr); }
    loop2026.setDate(loop2026.getDate() + 7);
  }

  let loop2027 = new Date("2027-01-01");
  const end2027 = new Date("2027-12-31");
  while (loop2027 <= end2027) {
    let dateStr = formatDateToYYYYMMDD(loop2027);
    if (!HOLIDAYS.includes(dateStr)) { availableDates.push(dateStr); }
    loop2027.setDate(loop2027.getDate() + 7);
  }
  
  availableDates.sort();
  currentSelectedDateStr = findDefaultMondayStr(now, availableDates);
  
  availableDates.forEach(dateStr => {
    const mondayObj = new Date(dateStr);
    const sessionDetails = calculateSessionDetailsForDate(mondayObj);
    const year = mondayObj.getFullYear();
    const month = mondayObj.getMonth() + 1;
    
    sessionOptionsData[dateStr] = sessionDetails;
    
    let item = { value: dateStr, text: `📆 球聚日期：${dateStr} (週一)` };
    
    if (dateStr === currentSelectedDateStr) {
      let currentItem = { value: dateStr, text: item.text + "【⭐ 當期球聚】" };
      structuredQuarterData.current.push(currentItem);
    }
    
    if (dateStr < currentSelectedDateStr) {
      structuredQuarterData.history.push(item);
    } else {
      if (year === 2026) {
        if (month >= 7 && month <= 9) structuredQuarterData.y2026q3.push(item);
        else if (month >= 10 && month <= 12) structuredQuarterData.y2026q4.push(item);
      } else if (year === 2027) {
        if (month >= 1 && month <= 3) structuredQuarterData.y2027q1.push(item);
        else if (month >= 4 && month <= 6) structuredQuarterData.y2027q2.push(item);
        else if (month >= 7 && month <= 9) structuredQuarterData.y2027q3.push(item);
        else if (month >= 10 && month <= 12) structuredQuarterData.y2027q4.push(item);
      }
    }
  });
  
  renderDateOptions("current");
}

function renderDateOptions(targetQuarter) {
  sessionSelect.innerHTML = "";
  let list = structuredQuarterData[targetQuarter] || [];
  
  if (list.length === 0) {
    const opt = document.createElement("option");
    opt.innerText = "本季暫無安排場次或皆為歷史紀錄";
    opt.disabled = true;
    sessionSelect.appendChild(opt);
    return;
  }
  
  list.forEach(item => {
    const opt = document.createElement("option");
    opt.value = item.value;
    opt.innerText = item.text;
    if (item.value === currentSelectedDateStr) { opt.selected = true; }
    sessionSelect.appendChild(opt);
  });
  
  switchFirebaseNode(sessionSelect.value);
}

quarterSelect.addEventListener("change", (e) => { renderDateOptions(e.target.value); });
sessionSelect.addEventListener("change", (e) => { if (e.target.value) { switchFirebaseNode(e.target.value); } });

function switchFirebaseNode(dateStr) {
  if (!dateStr) return;
  if (dbRef) dbRef.off();
  currentSelectedDateStr = dateStr;
  dbRef = database.ref(`sessions_monday/${dateStr}`);
  dbRef.on("value", snapshot => { 
    rawCachedData = snapshot.val() || {}; 
    renderList(rawCachedData); 
  });
  updateSystemStatus();
}

function updateSystemStatus() {
  const now = new Date();
  const activeSession = sessionOptionsData[currentSelectedDateStr];
  if (!activeSession) return;
  
  let msg = `📅 <b>本次球聚日期：${activeSession.gameDateStr} (週一) 18:00-20:00</b><br>`;
  const isOpen = now >= activeSession.openTime && now < activeSession.deadline;
  
  msg += `🔹 季租登記：<b>${activeSession.openDateStr}</b> (二) 18:00 ~ <b>${activeSession.deadlineDateStr}</b> (日) 18:00 (${isOpen ? '🟢 開放中' : '🔒 已截止'})<br>`;
  msg += `🔸 散打登記：<b>${activeSession.openDateStr}</b> (二) 18:00 ~ <b>${activeSession.deadlineDateStr}</b> (日) 18:00 (${isOpen ? '🟢 開放中' : '🔒 已截止'})<br>`;
  
  if (now < activeSession.openTime) {
    msg += `📢 <b>目前狀態：【🔒 尚未開放登記】</b>`;
  } else if (now >= activeSession.deadline) {
    msg += `📢 <b>目前狀態：【🔒 登記已截止，系統鎖定中】</b>`;
  } else {
    msg += `📢 <b>目前狀態：【🟢 開放登記中，散打一律於候補區排隊，待週日 18:00 截止後才進行遞補】</b>`;
  }
  deadlineMessage.innerHTML = msg;
}
setInterval(updateSystemStatus, 5000);

adminBtn.addEventListener("click", () => {
  const inputPwd = prompt("請輸入管理員密碼：");
  if (inputPwd === ADMIN_PASSWORD) { isAdminMode = true; adminBtn.style.display = "none"; adminStatus.style.display = "inline"; alert("🔑 管理員認證成功！❌ 刪除功能已解鎖。"); renderList(rawCachedData); } else if (inputPwd !== null) { alert("❌ 密碼錯誤！"); }
});

function renderList(data) {
  const attendList = document.getElementById("attendList"); const waitList = document.getElementById("waitList"); const leaveList = document.getElementById("leaveList");
  attendList.innerHTML = ""; waitList.innerHTML = ""; leaveList.innerHTML = "";
  
  const players = []; for (let id in data) { players.push({ id, ...data[id] }); }
  players.sort((a, b) => a.timestamp - b.timestamp);
  
  const now = new Date();
  const activeSession = sessionOptionsData[currentSelectedDateStr];
  const isClosed = activeSession ? now >= activeSession.deadline : true;
  
  let seasonAttendCount = 0; let casualPlayers = []; let leavePlayers = [];
  
  players.forEach(p => { 
    if (p.status === "請假") { leavePlayers.push(p); } 
    else if (p.status === "出賽") { 
      if (p.identity === "季租") { seasonAttendCount++; } 
      else { casualPlayers.push(p); } 
    } 
  });
  
  let availableSlots = Math.max(0, 20 - seasonAttendCount); 
  let finalAttendCount = 0; 
  let finalWaitCount = 0;
  
  let finalAttendSeasonListHTML = [];
  let finalAttendCasualListHTML = [];

  players.forEach(player => {
    if (player.status === "請假") return;
    
    const timeStr = formatFullTimestamp(player.timestamp); 
    const li = document.createElement("li"); 
    const metaDiv = document.createElement("div"); 
    metaDiv.className = "player-meta"; 
    const nameSpan = document.createElement("span"); 
    nameSpan.innerHTML = `<b>${player.name}</b>`; 
    metaDiv.appendChild(nameSpan);
    
    let labelText = ""; let idClass = ""; let isWaitZone = false;
    
    if (player.identity === "季租") { 
      idClass = "bg-blue"; labelText = "季租"; finalAttendCount++; 
    } else { 
      let idx = casualPlayers.findIndex(c => c.name === player.name); 
      if (isClosed) { 
        if (idx !== -1 && idx < availableSlots) { 
          idClass = "bg-green"; labelText = `散打(遞補 ${idx + 1})`; finalAttendCount++; 
        } else { 
          idClass = "bg-orange"; labelText = `散打(候 ${idx - availableSlots + 1})`; isWaitZone = true; finalWaitCount++; 
        } 
      } else { 
        idClass = "bg-orange"; labelText = `散打(候 ${idx + 1})`; isWaitZone = true; finalWaitCount++; 
      } 
    }
    
    const tagSpan = document.createElement("span"); 
    tagSpan.className = `identity-tag ${idClass}`; 
    tagSpan.innerText = labelText; 
    metaDiv.appendChild(tagSpan); 
    li.appendChild(metaDiv); 
    
    const timeDiv = document.createElement("div"); 
    timeDiv.className = "time-tag"; 
    timeDiv.innerText = `⏱️ ${timeStr}`; 
    li.appendChild(timeDiv);
    
    if (isAdminMode) { 
      const delBtn = document.createElement("button"); 
      delBtn.innerText = "❌ 刪除"; 
      delBtn.style.cssText = "align-self:flex-end; font-size:11px; margin-top:5px; cursor:pointer; width:auto; padding:2px 8px; background:#ef4444;"; 
      delBtn.addEventListener("click", () => { 
        if(confirm(`確認刪除 ${player.name}？`)) database.ref(`sessions_monday/${currentSelectedDateStr}/${player.name}`).remove(); 
      }); 
      li.appendChild(delBtn); 
    } 
    
    if (isWaitZone) { waitList.appendChild(li); } 
    else {
      if (player.identity === "季租") { finalAttendSeasonListHTML.push(li); } 
      else { finalAttendCasualListHTML.push(li); }
    }
  });
  
  finalAttendSeasonListHTML.forEach(el => attendList.appendChild(el));
  finalAttendCasualListHTML.forEach(el => attendList.appendChild(el));
  
  leavePlayers.forEach(player => {
    const timeStr = formatFullTimestamp(player.timestamp); const li = document.createElement("li"); const metaDiv = document.createElement("div"); metaDiv.className = "player-meta"; const nameSpan = document.createElement("span"); nameSpan.innerHTML = `<b>${player.name}</b>`; metaDiv.appendChild(nameSpan); const idClass = player.identity === "季租" ? "bg-blue" : "bg-green"; const tagSpan = document.createElement("span"); tagSpan.className = `identity-tag ${idClass}`; tagSpan.innerText = player.identity === "季租" ? "季租(假)" : "散打(假)"; metaDiv.appendChild(tagSpan); li.appendChild(metaDiv); const timeDiv = document.createElement("div"); timeDiv.className = "time-tag"; timeDiv.innerText = `⏱️ ${timeStr}`; li.appendChild(timeDiv);
    if (isAdminMode) { const delBtn = document.createElement("button"); delBtn.innerText = "❌ 刪除"; delBtn.style.cssText = "align-self:flex-end; font-size:11px; margin-top:5px; cursor:pointer; width:auto; padding:2px 8px; background:#ef4444;"; delBtn.addEventListener("click", () => { database.ref(`sessions_monday/${currentSelectedDateStr}/${player.name}`).remove(); }); li.appendChild(delBtn); } leaveList.appendChild(li);
  });
  
  document.getElementById("attendCount").innerText = finalAttendCount; 
  document.getElementById("waitCount").innerText = finalWaitCount; 
  document.getElementById("leaveCount").innerText = leavePlayers.length;
}

submitBtn.addEventListener("click", () => {
  const name = nameInput.value.trim(); const identity = identitySelect.value; const status = document.querySelector('input[name="status"]:checked').value; const now = new Date();
  const activeSession = sessionOptionsData[currentSelectedDateStr];
  if (!activeSession) return;
  if (!name) { alert("請輸入姓名！"); return; } 
  if (now < activeSession.openTime) { alert(`抱歉！【${currentSelectedDateStr}】球聚尚未開放登記。`); return; } 
  if (now >= activeSession.deadline && !isAdminMode) { alert("🔒 本期報名已截止，目前系統已鎖定，無法再進行新增或修改意願。"); return; }
  
  submitBtn.disabled = true; submitBtn.innerText = "處理中...";
  const userRef = database.ref(`sessions_monday/${currentSelectedDateStr}/${name}`);
  
  userRef.set({ 
    name: name, 
    identity: identity, 
    status: status, 
    timestamp: firebase.database.ServerValue.TIMESTAMP 
  }).then(() => { 
    alert(`🎉 【${name}】在 ${currentSelectedDateStr} 的資料已更新成功！`); 
    nameInput.value = ""; 
  }).catch(err => {
    alert("儲存失敗：" + err.message);
  }).finally(() => { 
    submitBtn.disabled = false; 
    submitBtn.innerText = "確認送出報名"; 
  });
});

initSelectorOptions();
</script>
</body>
